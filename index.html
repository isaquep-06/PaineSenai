<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Turmas e Salas</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'Arial', sans-serif;
      background-color: #f0f2f5;
      padding: 20px;
      color: #333;
    }

    h1 {
      margin-bottom: 15px;
      color: #444;
      font-size: 24px;
      border-bottom: 2px solid #4CAF50;
      padding-bottom: 5px;
    }

    ul {
      list-style: none;
      padding: 0;
      margin-bottom: 30px;
    }

    li {
      background: #fff;
      margin-bottom: 10px;
      padding: 15px;
      border-radius: 8px;
      box-shadow: 0 2px 6px rgba(0, 0, 0, 0.1);
      font-size: 16px;
    }

    form {
      background: #fff;
      padding: 20px;
      border-radius: 8px;
      box-shadow: 0 3px 10px rgba(0, 0, 0, 0.1);
      max-width: 400px;
    }

    form input,
    form select,
    form button {
      width: 100%;
      padding: 10px;
      margin-bottom: 15px;
      border-radius: 6px;
      border: 1px solid #ccc;
      font-size: 16px;
      transition: all 0.2s ease;
    }

    form input:focus,
    form select:focus {
      border-color: #4CAF50;
      outline: none;
      box-shadow: 0 0 5px rgba(76, 175, 80, 0.5);
    }

    form button {
      background-color: #4CAF50;
      color: #fff;
      border: none;
      cursor: pointer;
      font-weight: bold;
      transition: background-color 0.3s ease;
    }

    form button:hover {
      background-color: #45a049;
    }

    @media (max-width: 480px) {
      body {
        padding: 10px;
      }

      form {
        width: 100%;
        padding: 15px;
      }

      li {
        font-size: 14px;
        padding: 12px;
      }
    }
  </style>
</head>

<body>
  <h1>Lista de Turmas</h1>
  <ul id="turmas"></ul>

  <h1>Criar Turma</h1>
  <form id="formTurma">
    <input type="text" placeholder="Nome da turma" name="nome" required />
    <input type="text" placeholder="Turno" name="turno" required />
    <select name="sala_id" id="selectSala">
      <option value="">Selecione a sala</option>
    </select>
    <button type="submit">Criar Turma</button>
  </form>

  <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
  <script>
    const turmasList = document.getElementById('turmas');
    const formTurma = document.getElementById('formTurma');
    const selectSala = document.getElementById('selectSala');
    const API_URL = 'http://localhost:3000'; // ajuste se a API tiver outra porta

    // Carrega salas no select
    async function carregarSalas() {
      try {
        const res = await axios.get(`${API_URL}/sala`);
        res.data.forEach(sala => {
          const option = document.createElement('option');
          option.value = sala.id;
          option.textContent = sala.name;
          selectSala.appendChild(option);
        });
      } catch (err) {
        console.error('Erro ao carregar salas:', err);
      }
    }

    // Carrega turmas na lista
    async function carregarTurmas() {
      turmasList.innerHTML = '';
      try {
        const res = await axios.get(`${API_URL}/turma`);
        res.data.forEach(turma => {
          const li = document.createElement('li');
          li.textContent = `Turma: ${turma.name} | Turno: ${turma.turno} | Sala: ${turma.Sala ? turma.Sala.name : '-'}`;
          turmasList.appendChild(li);
        });
      } catch (err) {
        console.error('Erro ao carregar turmas:', err);
      }
    }

    // Criar turma via formulário
    formTurma.addEventListener('submit', async e => {
      e.preventDefault();
      const formData = new FormData(formTurma);
      const data = {
        nome: formData.get('nome'),
        turno: formData.get('turno'),
        sala_id: formData.get('sala_id') ? Number(formData.get('sala_id')) : null // converte para número
      };

      try {
        const res = await axios.post(`${API_URL}/turma`, data);
        alert(res.data.message);
        formTurma.reset();
        carregarTurmas();
      } catch (err) {
        alert(err.response?.data?.message || 'Erro ao criar turma');
      }
    });

    // Inicialização
    carregarSalas();
    carregarTurmas();
  </script>
</body>

</html>
